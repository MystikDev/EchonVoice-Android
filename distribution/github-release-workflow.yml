name: Release APK

# Builds the signed release APK and attaches it to a GitHub Release whenever a
# v* tag is pushed. The website download link and the in-app updater both point
# at this release's `echon-release.apk` asset, so cutting a release is: bump
# versionCode/versionName + distribution/latest.json, commit, then `git tag vX && git push --tags`.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ECHON_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ECHON_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ECHON_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ECHON_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/echon-release.jks
          cat > keystore.properties <<EOF
          storeFile=echon-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build signed release APK
        run: ./gradlew :app:assembleRelease

      - name: Stage APK with stable name
        run: cp app/build/outputs/apk/release/app-release.apk echon-release.apk

      # Compute the APK's SHA-256 and write it into the update manifest, then
      # commit the manifest to main. The in-app updater verifies the downloaded
      # APK against this hash before install (defense-in-depth over the OS
      # same-signing-key check). Because the manifest is committed AFTER the
      # artifact is built, the hash always matches the published APK.
      - name: Inject APK SHA-256 into manifest and commit
        run: |
          SHA256=$(sha256sum echon-release.apk | awk '{print $1}')
          echo "APK sha256=$SHA256"
          python3 - "$SHA256" <<'PY'
          import json, sys
          sha = sys.argv[1]
          path = "distribution/latest.json"
          with open(path) as f:
              manifest = json.load(f)
          manifest["sha256"] = sha
          with open(path, "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add distribution/latest.json
          git commit -m "chore(release): pin APK sha256 for ${GITHUB_REF_NAME}" || echo "manifest unchanged"
          git push origin main

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: echon-release.apk
          generate_release_notes: true
