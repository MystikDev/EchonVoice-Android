name: Release APK

# Builds the signed release APK and publishes it as a GitHub Release whenever a
# v* tag is pushed. To cut a release: bump versionCode/versionName in
# app/build.gradle.kts (and edit distribution/latest.json "notes"), commit, then
#   git tag vX.Y.Z && git push origin main --tags
# CI derives version_code/version_name/sha256 from the built APK and commits them
# into distribution/latest.json, so the manifest can never drift from the artifact.
#
# Hardening (security review #3): actions pinned to commit SHAs, signing gated to
# the `release` environment (add required reviewers in repo settings), the tag is
# verified to point at main before signing, the keystore is deleted before the
# publish action runs, and a build-provenance attestation is produced for the APK.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # Refuse to release a tag that isn't an ancestor of main (blocks a rogue tag
      # pushed off an unreviewed commit from ever reaching the signing step).
      - name: Verify tag points to main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag commit $GITHUB_SHA is not on main — refusing to sign/release."
            exit 1
          fi

      - uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b # v4.5.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Restore signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ECHON_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ECHON_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ECHON_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ECHON_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/echon-release.jks
          cat > keystore.properties <<EOF
          storeFile=echon-release.jks
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Firebase config for push notifications. Optional: if the secret isn't set,
      # the build proceeds with push inert (the plugin is skipped when the file is
      # absent). When present, released builds have FCM active.
      - name: Restore Firebase config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.ECHON_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 --decode > app/google-services.json
            echo "Firebase config restored (push enabled)."
          else
            echo "No Firebase secret; building with push inert."
          fi

      - name: Build signed release APK (direct-download flavor)
        run: ./gradlew :app:assembleDirectRelease

      - name: Stage APK with stable name
        run: cp app/build/outputs/apk/direct/release/app-direct-release.apk echon-release.apk

      # Delete signing material immediately after the build so no later step or
      # (compromised) action can read the key.
      - name: Shred signing material
        if: always()
        run: rm -f app/echon-release.jks keystore.properties

      - name: Attest build provenance for the APK
        uses: actions/attest-build-provenance@520d128f165991a6c774bcb264f323e3d70747f4 # v2.2.0
        with:
          subject-path: echon-release.apk

      # Derive version + hash from the built APK and commit them into the manifest
      # so the in-app updater's version check and SHA-256 verification always match
      # the published artifact. "notes" is preserved from the committed manifest.
      - name: Sync manifest to built APK and commit
        run: |
          SHA256=$(sha256sum echon-release.apk | awk '{print $1}')
          AAPT=$(ls "$ANDROID_HOME"/build-tools/*/aapt2 | sort -V | tail -1)
          BADGING=$("$AAPT" dump badging echon-release.apk)
          VC=$(printf '%s' "$BADGING" | sed -n "s/.*versionCode='\([0-9]*\)'.*/\1/p")
          VN=$(printf '%s' "$BADGING" | sed -n "s/.*versionName='\([^']*\)'.*/\1/p")
          echo "versionCode=$VC versionName=$VN sha256=$SHA256"
          python3 - "$VC" "$VN" "$SHA256" <<'PY'
          import json, sys
          vc, vn, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          path = "distribution/latest.json"
          m = json.load(open(path))
          m["version_code"] = int(vc)
          m["version_name"] = vn
          m["sha256"] = sha
          with open(path, "w") as f:
              json.dump(m, f, indent=2)
              f.write("\n")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add distribution/latest.json
          git commit -m "chore(release): sync manifest to ${GITHUB_REF_NAME}" || echo "manifest unchanged"
          git push origin main

      - name: Publish release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: echon-release.apk
          generate_release_notes: true
