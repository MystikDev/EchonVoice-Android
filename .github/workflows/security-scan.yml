name: Dependency advisory scan

# OSV dependency/vulnerability scan (security review #2/#3: "add OSV or
# dependency-advisory scanning to CI"). Runs on pushes/PRs to main and weekly.
# Advisory (continue-on-error) so a newly-published transitive CVE surfaces in the
# Actions log without blocking an unrelated release.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC

permissions:
  contents: read

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run OSV-Scanner
        continue-on-error: true
        uses: google/osv-scanner-action@e69cc6c86b31f1e7e23935bbe7031b50e51082de # v2.0.2
        with:
          scan-args: |-
            -r
            --skip-git
            ./
